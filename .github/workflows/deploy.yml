name: Deploy Angular App to GitHub Pages

on:
  push:
    branches:
      - main # ou master, selon le nom de votre branche principale

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Utilisez la version de Node.js compatible avec votre projet
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Angular app
        # Remplacer <nom-du-repo> par le nom exact de votre repository GitHub
        # ex: si l'url est https://simon.github.io/recrutement-fac/, mettre /recrutement-fac/
        run: npm run build -- --base-href /Marcel/ 

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Le chemin dépend du nom de votre projet dans angular.json. 
          # Par défaut dans les versions récentes d'Angular, c'est dist/nom-du-projet/browser
          path: 'dist/outil-d-aide-au-recrutement-fac/browser' 

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
