name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main  # ou 'master' selon la branche par défaut de votre dépôt

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Build
        # IMPORTANT : Remplacez <NOM_DU_REPO> par le nom exact de votre dépôt
        # Par exemple, si votre repo est github.com/simon/mon-app, mettez /mon-app/
        run: npm run build -- --base-href /Marcel/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
